name: CI — Build, Lint & Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy value so the build doesn't fail on the missing gate password.
      DASHBOARD_PASSWORD: x
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    env:
      DASHBOARD_PASSWORD: x
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --omit=dev
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Start Next.js server
        run: npm start &

      - name: Wait for server startup
        run: sleep 5

      - name: Smoke test — GET /login (expect 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login)
          echo "GET /login → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Expected 200, got $STATUS"
            exit 1
          fi

      - name: Smoke test — GET /api/auth/login-url (expect 200 + JSON)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:3000/api/auth/login-url)
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "GET /api/auth/login-url → HTTP $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Expected 200, got $STATUS"
            exit 1
          fi
          # Verify response is valid JSON
          echo "$BODY" | python3 -c "import sys, json; json.load(sys.stdin)" || {
            echo "❌ Response is not valid JSON"
            exit 1
          }
          echo "✅ All smoke tests passed"
